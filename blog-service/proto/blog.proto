syntax = "proto3";

package blog;

import "google/protobuf/timestamp.proto";

option go_package = "./proto";

service BlogService {
  rpc GetAllBlogs (EmptyRequest) returns (BlogListResponse);
  rpc GetBlogById (BlogIdRequest) returns (BlogResponse);
}

message EmptyRequest {}

message BlogIdRequest {
  string id = 1;
}

message CommentMessage {
  string id = 1;
  string authorId = 2;
  string content = 3;
  google.protobuf.Timestamp createdAt = 4;
  google.protobuf.Timestamp updatedAt = 5;
}

message BlogMessage {
  string id = 1;
  string title = 2;
  string description = 3;
  google.protobuf.Timestamp createdAt = 4;
  string imageUrl = 5;
  string authorId = 6;

  repeated string likes = 7;
  repeated CommentMessage comments = 8;
}

message BlogResponse {
  BlogMessage blog = 1;
}

message BlogListResponse {
  repeated BlogMessage blogs = 1;
}