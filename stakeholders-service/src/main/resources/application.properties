spring.application.name=stakeholders

spring.datasource.url=jdbc:postgresql://localhost:5432/stakeholders_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

grpc.client.tour-service.address=static://localhost:9090
grpc.client.tour-service.negotiationType=plaintext