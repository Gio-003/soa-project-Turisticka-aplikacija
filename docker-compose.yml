version: '3.8'

services:
  postgres:
    image: postgres:13-alpine
    container_name: blog_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: blog_service
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blog_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  blog-service:
    build:
      context: ./blog-service
    container_name: blog_service
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_CONNECTION_STRING: "host=postgres user=postgres password=root dbname=blog_service port=5432"

  stakeholders-service:
    build:
      context: ./stakeholders-service
    container_name: stakeholders_service
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stakeholders_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: api_gateway
    ports:
      - "80:80"
    depends_on:
      - blog-service
      - stakeholders-service
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data: