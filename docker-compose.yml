services:

  postgres:
    image: postgres:13-alpine
    container_name: main_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: tour_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data 
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tourapp-network

  mongo:
    image: mongo:7
    container_name: mongo_db
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: pass
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --username root --password pass --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - tourapp-network

  mongo-express:
    image: mongo-express
    container_name: blog_mongo_express
    restart: always
    ports:
      - "8084:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: pass
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - tourapp-network

  blog-service:
    build:
      context: ./blog-service
    restart: always
    ports:
      - "8080:8080"
    environment:
      MONGO_URI: mongodb://root:pass@mongo:27017/blogdb?authSource=admin
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - tourapp-network

  follower-service:
    build:
      context: ./follower-service
    container_name: follower_service
    restart: always
    ports:
      - "8083:8083"
    environment:
      PORT: 8083
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - tourapp-network

  neo4j:
    image: neo4j:5
    container_name: follower_neo4j
    restart: always
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
    networks:
      - tourapp-network

  stakeholders-service:
    build:
      context: ./stakeholders-service
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stakeholders_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tourapp-network

  tour-service:
    build:
      context: ./tour-service
    restart: always
    ports:
      - "8082:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=tour_db;Username=postgres;Password=root"
      PURCHASE_RPC_URL: http://purchase-service:8080/rpc
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tourapp-network

  purchase-service:
    build:
      context: ./purchase-service
    restart: always
    ports:
      - "8085:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=purchase_db;Username=postgres;Password=root"
      TOUR_RPC_URL: http://tour-service:8080/rpc
    depends_on:
      postgres:
        condition: service_healthy
      tour-service:
        condition: service_started
    networks:
      - tourapp-network

  frontend-service:
    build:
      context: ./frontend-service
    container_name: frontend_service
    ports:
      - "4200:80"
    networks:
      - tourapp-network

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api_gateway
    ports:
      - "8000:8000"
    environment:
      BLOG_SERVICE_URL: http://blog-service:8080
      STAKEHOLDERS_SERVICE_URL: http://stakeholders-service:8080
      TOUR_SERVICE_URL: http://tour-service:8080
      FOLLOWER_SERVICE_URL: http://follower-service:8083
      PURCHASE_SERVICE_URL: http://purchase-service:8080
      JWT_SECRET: somesecret-key-for-jwt-token-has-to-be-512-bits-long-1234567890123456789
    depends_on:
      - blog-service
      - stakeholders-service
      - tour-service
      - follower-service
      - purchase-service
    networks:
      - tourapp-network

volumes:
  postgres_data:
  neo4j_data:

networks:
  tourapp-network:
    driver: bridge
