version: '3.8'

services:
  postgres:
    image: postgres:13-alpine
    container_name: blog_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: blog_service
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # DODATO: Proverava da li je baza spremna pre nego što dozvoli konekcije
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blog_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  blog-service:
    build:
      context: ./blog-service
    container_name: blog_service
    depends_on:
      # PROMENJENO: Sada čeka da healthcheck prođe
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_CONNECTION_STRING: "host=postgres user=postgres password=root dbname=blog_service port=5432"

volumes:
  postgres_data: