<div class="container">
  <h2>Create a New Blog</h2>
  <div class="form-group">
    <input type="text" [(ngModel)]="newBlogTitle" placeholder="Blog Title" class="form-control">
  </div>
  <div class="form-group">
    <textarea [(ngModel)]="newBlogDescription" placeholder="Blog Description" class="form-control"></textarea>
  </div>
  <button (click)="createBlog()" class="btn btn-primary">Create Blog</button>

  <hr>

  <h2>Blogs</h2>
  <div *ngFor="let blog of blogs" class="blog-post">
    <h3>{{ blog.title }}</h3>
    <p>{{ blog.description }}</p>
    <div class="actions">
      <button (click)="likeBlog(blog.id)" class="btn btn-success">Like ({{ blog.likes.length }})</button>
      <button (click)="unlikeBlog(blog.id)" class="btn btn-danger">Unlike</button>
    </div>

    <div class="comments">
      <h4>Comments</h4>
      <ul>
        <li *ngFor="let comment of blog.comments">{{ comment.content }}</li>
      </ul>
      <div class="form-group">
        <input type="text" #commentInput placeholder="Add a comment" class="form-control">
      </div>
      <button (click)="addComment(blog.id, commentInput.value)" class="btn btn-secondary">Add Comment</button>
    </div>
  </div>
</div>
